<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mini-Bot • Pairing Code</title>
<style>
  :root {
    --green: #25d366;
    --dark: #111b21;
    --panel: #202c33;
    --text: #e9edef;
    --muted: #8696a0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--dark);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    color: var(--text);
    padding: 20px;
  }
  .card {
    background: var(--panel);
    border-radius: 16px;
    padding: 32px 28px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    text-align: center;
  }
  .logo {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--green);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
    font-size: 26px;
  }
  h1 { font-size: 18px; margin: 0 0 4px; }
  p.sub { color: var(--muted); font-size: 13px; margin: 0 0 24px; }
  input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid #2a3942;
    background: #2a3942;
    color: var(--text);
    font-size: 15px;
    outline: none;
    margin-bottom: 14px;
  }
  input::placeholder { color: var(--muted); }
  button {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: none;
    background: var(--green);
    color: #052014;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  .result {
    margin-top: 22px;
    padding: 18px;
    border-radius: 12px;
    background: #0b141a;
    display: none;
  }
  .result.show { display: block; }
  .code {
    font-size: 30px;
    letter-spacing: 4px;
    font-weight: 700;
    color: var(--green);
    font-family: "SFMono-Regular", Consolas, monospace;
  }
  .hint { color: var(--muted); font-size: 12px; margin-top: 10px; line-height: 1.5; }
  .error { color: #f15c6d; font-size: 13px; margin-top: 12px; display: none; }
  .error.show { display: block; }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">📱</div>
    <h1>Link with a pairing code</h1>
    <p class="sub">Enter your WhatsApp number with country code (no + or spaces)</p>

    <input id="number" type="tel" placeholder="e.g. 94712345678" autocomplete="off" />
    <button id="submitBtn">Get pairing code</button>

    <div class="error" id="error"></div>

    <div class="result" id="result">
      <div class="code" id="code">----&nbsp;----</div>
      <div class="hint">
        Open WhatsApp → Linked devices → Link a device → Link with phone number,
        then enter this code before it expires.
      </div>
    </div>
  </div>

<script>
  const btn = document.getElementById('submitBtn');
  const numberInput = document.getElementById('number');
  const resultBox = document.getElementById('result');
  const codeEl = document.getElementById('code');
  const errorEl = document.getElementById('error');

  async function requestCode() {
    const number = numberInput.value.trim();
    errorEl.classList.remove('show');
    resultBox.classList.remove('show');

    if (!number) {
      errorEl.textContent = 'Please enter a phone number.';
      errorEl.classList.add('show');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Requesting...';

    try {
      const res = await fetch('/pair', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ number }),
      });
      const data = await res.json();

      if (!data.ok) throw new Error(data.error || 'Failed to get pairing code');

      codeEl.textContent = data.code;
      resultBox.classList.add('show');
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.classList.add('show');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Get pairing code';
    }
  }

  btn.addEventListener('click', requestCode);
  numberInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') requestCode();
  });
</script>
</body>
</html>
